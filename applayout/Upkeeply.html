<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-canvas);
    color: var(--fg-1);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 6px; border: 2px solid var(--bg-canvas); }
  ::-webkit-scrollbar-track { background: transparent; }
  button { font-family: var(--font-sans); }
  input, textarea, select { font-family: var(--font-sans); }
  textarea:focus, input:focus { outline: 2px solid var(--border-focus); outline-offset: 1px; border-color: transparent; }

  @keyframes logFresh { 0% { background: var(--crimson-100); } 100% { background: transparent; } }
  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.82); } }
  @keyframes scanY { 0% { top: 12%; } 50% { top: 86%; } 100% { top: 12%; } }
  @keyframes popIn { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
